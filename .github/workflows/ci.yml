name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed lib/ test/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter test
      - run: cd example && flutter pub get && flutter test

  kotlin-format:
    name: Kotlin format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.5.0/ktlint && chmod +x ktlint
      - run: ./ktlint 'android/src/main/kotlin/**/*.kt'

  swift-format:
    name: Swift format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: xcrun swift-format lint --recursive ios/restart_app/Sources/ macos/restart_app/Sources/

  cpp-format:
    name: C++ format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y clang-format
      - run: clang-format --dry-run --Werror linux/restart_app_plugin.cc windows/restart_app_plugin.cpp windows/restart_app_plugin_c_api.cpp

  publish-check:
    name: Publish check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart pub publish --dry-run
